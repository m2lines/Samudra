# Performance benchmarks with pytest
# Based on this example: https://github.com/benchmark-action/github-action-benchmark/tree/master/examples/pytest
name: Benchmark

# Do not run this workflow on pull request since this workflow has permission to modify contents.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ec2:
    permissions:
      contents: read
      id-token: write # Required for interacting with AWS via OIDC
    uses: Open-Athena/ec2-gha/.github/workflows/runner.yml@v2
    with:
      ec2_instance_type: g6.xlarge
      ec2_image_id: ami-0365bff494b18bf93 # Deep Learning OSS Nvidia Driver AMI GPU PyTorch 2.7 (Ubuntu 22.04) in oa-ci-dev
      ec2_root_device_size: 200 # leaves headroom for benchmarking I/O; instance runs out of disk otherwise
      aws_tags: '[{"Key": "project", "Value": "fomo"}]'
    secrets:
      GH_SA_TOKEN: ${{ secrets.GH_SA_TOKEN }}

  benchmark:
    needs: ec2
    runs-on: ${{ needs.ec2.outputs.id }}
    permissions:
      contents: write # Allow updating content on GitHub pages
      deployments: write # Allow to deploy to GitHub pages

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

        # Invalidate the data cache every time the data source changes.
        # If an exact cache isn't found, fall back to previous cache.
      - name: Cache test data
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .data_cache/
          key: ${{ runner.os }}-test-data-${{ hashFiles('tests/conftest.py', 'configs/test/*.yaml') }}

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Run CPU benchmarks
        run: uv run --locked pytest -m "not cuda" --benchmark-only --benchmark-json output-cpu.json

      - name: Run GPU benchmarks
        run: uv run --locked pytest -m "cuda" --benchmark-only --benchmark-json output-gpu.json

      # Avoid issues checking out the gh-pages branch (eg uv.lock updated)
      - name: Stash
        run: git stash

      # gh-pages branch is automatically updated with extracted benchmark data.
      - name: Store benchmark result (CPU)
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba
        with:
          name: Python Benchmark with pytest-benchmark
          tool: "pytest"
          output-file-path: output-cpu.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: "@alxmrs,@jder"

      # gh-pages branch is automatically updated with extracted benchmark data.
      - name: Store benchmark result (GPU)
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba
        with:
          name: Python Benchmark with pytest-benchmark (GPU)
          tool: "pytest"
          output-file-path: output-gpu.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: "@alxmrs,@jder"
