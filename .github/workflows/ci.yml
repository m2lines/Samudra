name: pre-commit-ci

on:
  pull_request:
  push:
    branches: [master, test]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v3
    - name: Run pre-commit
      id: pre-commit
      uses: pre-commit/action@v3.0.1
      with:
        fail-fast: false
  check-changes:
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Check for changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git diff --exit-code || (git commit -am "Pre-commit fixes" && git push)
        echo "Checked for changes"
      


