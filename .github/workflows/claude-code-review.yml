name: Claude Code Review

on:
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    # For PRs, if the comment contains `@claude` AND `review`, then we trigger this action, which includes the PR plug-in.
    # If the `author_association` is `'NONE'`, then they are an external contributor. We want to filter that case out.
    if: |
      (github.event_name == 'pull_request_review_comment' && github.event.comment.author_association != 'NONE' && contains(github.event.comment.body, '@claude') && contains(github.event.comment.body, 'review')) ||
      (github.event_name == 'pull_request_review' && github.event.review.author_association != 'NONE' && contains(github.event.review.body, '@claude') && contains(github.event.review.body, 'review'))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

