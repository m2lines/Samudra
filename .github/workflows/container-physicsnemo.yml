# Build the PhysicsNeMo-based container on PRs; on main/manual runs, also publish the
# x86_64 image and run the same container test flow on both x86_64 and arm64 GPU nodes.
name: Container PhysicsNeMo 25.11

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-smoke:
    runs-on: ubuntu-24.04-4-core
    env:
      LOCAL_IMAGE_TAG: ocean-emulator:physicsnemo-25.11-${{ github.sha }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Confirm x86_64 runner
        run: |
          arch="$(uname -m)"
          echo "runner arch=${arch}"
          test "${arch}" = "x86_64"

      - name: Reclaim runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:"
          df -h

          # Remove large preinstalled SDKs that are not used by this workflow.
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/vcpkg
          sudo swapoff -a || true
          sudo rm -f /swapfile || true

          # Move Docker root to the larger ephemeral mount on GitHub runners.
          if [ -d /mnt ]; then
            sudo mkdir -p /mnt/docker-data
            echo '{"data-root":"/mnt/docker-data"}' | sudo tee /etc/docker/daemon.json >/dev/null
            sudo systemctl restart docker
          fi

          echo "Disk usage after cleanup:"
          df -h
          docker info | grep "Docker Root Dir"

      - name: Build container
        run: |
          BUILDKIT_PROGRESS=plain \
          IMAGE_TAG="${LOCAL_IMAGE_TAG}" \
          DOCKERFILE=containers/Dockerfile.physicsnemo-25.11 \
          BUILD_APPTAINER=0 \
          bash scripts/container/build_physicsnemo_25_11.sh

      - name: Log in to GHCR
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          set -euo pipefail

          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          ghcr_image="ghcr.io/${owner_lower}/ocean-emulator-physicsnemo"

          sha_tag="${ghcr_image}:25.11-${GITHUB_SHA}"
          docker tag "${LOCAL_IMAGE_TAG}" "${sha_tag}"
          docker push "${sha_tag}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            ref_tag="${ghcr_image}:25.11-manual-${GITHUB_REF_NAME//\//-}"
            docker tag "${LOCAL_IMAGE_TAG}" "${ref_tag}"
            docker push "${ref_tag}"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            latest_tag="${ghcr_image}:25.11-latest"
            docker tag "${LOCAL_IMAGE_TAG}" "${latest_tag}"
            docker push "${latest_tag}"
          fi

  ec2:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build-and-smoke
    uses: Open-Athena/ec2-gha/.github/workflows/runner.yml@v2
    with:
      ec2_instance_type: g6.xlarge
      ec2_image_id: ami-0365bff494b18bf93 # Deep Learning OSS Nvidia Driver AMI GPU PyTorch 2.7 (Ubuntu 22.04) in oa-ci-dev
      ec2_root_device_size: 200 # large image pull + test data/cache need substantial headroom
      aws_tags: '[{"Key": "project", "Value": "fomo"}]'
    secrets:
      GH_SA_TOKEN: ${{ secrets.GH_SA_TOKEN }}

  resolve-arm-dlami:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build-and-smoke
    runs-on: ubuntu-latest
    outputs:
      ami_id: ${{ steps.resolve.outputs.ami_id }}
      aws_region: ${{ steps.resolve.outputs.aws_region }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.EC2_LAUNCH_ROLE }}
          role-session-name: github-actions-session
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve latest ARM64 GPU DLAMI
        id: resolve
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          ARM_DLAMI_NAME_FILTER: Deep Learning ARM64 Base OSS Nvidia Driver GPU AMI (Ubuntu 24.04) ????????
        run: |
          set -euo pipefail
          ami_id="$(aws ec2 describe-images \
            --region "${AWS_REGION}" \
            --owners amazon \
            --filters \
              "Name=name,Values=${ARM_DLAMI_NAME_FILTER}" \
              "Name=state,Values=available" \
            --query 'reverse(sort_by(Images, &CreationDate))[:1].ImageId' \
            --output text)"
          echo "ami_id=${ami_id}" >> "${GITHUB_OUTPUT}"
          echo "aws_region=${AWS_REGION}" >> "${GITHUB_OUTPUT}"

  ec2-arm:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [build-and-smoke, resolve-arm-dlami]
    uses: Open-Athena/ec2-gha/.github/workflows/runner.yml@v2
    with:
      aws_region: ${{ needs.resolve-arm-dlami.outputs.aws_region }}
      ec2_instance_type: g5g.xlarge
      ec2_image_id: ${{ needs.resolve-arm-dlami.outputs.ami_id }}
      ec2_root_device_size: 200 # local arm64 image build plus test data/cache need substantial headroom
      aws_tags: '[{"Key": "project", "Value": "fomo"}]'
    secrets:
      GH_SA_TOKEN: ${{ secrets.GH_SA_TOKEN }}

  test-container-cpu-gpu:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [build-and-smoke, ec2]
    runs-on: ${{ needs.ec2.outputs.id }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Cache test data
        uses: actions/cache@v3
        with:
          path: .data_cache/
          key: ${{ runner.os }}-test-data-${{ hashFiles('tests/conftest.py', 'configs/test/*.yaml') }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show disk before pull
        run: |
          df -h
          docker system df || true

      - name: Pull published image
        run: |
          set -euo pipefail
          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lower}/ocean-emulator-physicsnemo:25.11-${GITHUB_SHA}"
          docker pull "${image}"
          echo "TEST_IMAGE=${image}" >> "${GITHUB_ENV}"

      - name: Run CPU tests in container
        timeout-minutes: 90
        run: |
          docker run --rm \
            --ipc=host \
            -v "${GITHUB_WORKSPACE}/.data_cache:/workspace/.data_cache" \
            --workdir /workspace \
            --entrypoint bash \
            "${TEST_IMAGE}" -lc '
              set -euo pipefail
              . .venv/bin/activate
              python -m pytest -p no:zarr -n 2 -v -m "not manual and not cuda"
            '

      - name: Run GPU tests in container
        timeout-minutes: 90
        run: |
          docker run --rm --gpus all \
            --ipc=host \
            -v "${GITHUB_WORKSPACE}/.data_cache:/workspace/.data_cache" \
            --workdir /workspace \
            --entrypoint bash \
            "${TEST_IMAGE}" -lc '
              set -euo pipefail
              . .venv/bin/activate
              python -m pytest -p no:zarr -v -m "not manual and cuda" -x
            '

  test-container-arm64-cpu-gpu:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [build-and-smoke, resolve-arm-dlami, ec2-arm]
    runs-on: ${{ needs.ec2-arm.outputs.id }}
    env:
      LOCAL_ARM64_IMAGE_TAG: ocean-emulator:physicsnemo-25.11-arm64-${{ github.sha }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Confirm arm64 runner
        run: |
          arch="$(uname -m)"
          echo "runner arch=${arch}"
          test "${arch}" = "aarch64"

      - name: Cache test data
        uses: actions/cache@v3
        with:
          path: .data_cache/
          key: ${{ runner.os }}-${{ runner.arch }}-test-data-${{ hashFiles('tests/conftest.py', 'configs/test/*.yaml') }}

      - name: Show disk before build
        run: |
          df -h
          docker system df || true

      - name: Build arm64 container
        run: |
          BUILDKIT_PROGRESS=plain \
          IMAGE_TAG="${LOCAL_ARM64_IMAGE_TAG}" \
          DOCKERFILE=containers/Dockerfile.physicsnemo-25.11 \
          BUILD_APPTAINER=0 \
          bash scripts/container/build_physicsnemo_25_11.sh

      - name: Run CPU tests in arm64 container
        timeout-minutes: 90
        run: |
          docker run --rm \
            --ipc=host \
            -v "${GITHUB_WORKSPACE}/.data_cache:/workspace/.data_cache" \
            --workdir /workspace \
            --entrypoint bash \
            "${LOCAL_ARM64_IMAGE_TAG}" -lc '
              set -euo pipefail
              . .venv/bin/activate
              python -m pytest -p no:zarr -n 2 -v -m "not manual and not cuda"
            '

      - name: Run GPU tests in arm64 container
        timeout-minutes: 90
        run: |
          docker run --rm --gpus all \
            --ipc=host \
            -v "${GITHUB_WORKSPACE}/.data_cache:/workspace/.data_cache" \
            --workdir /workspace \
            --entrypoint bash \
            "${LOCAL_ARM64_IMAGE_TAG}" -lc '
              set -euo pipefail
              . .venv/bin/activate
              python -m pytest -p no:zarr -v -m "not manual and cuda" -x
            '

  report-container-test-status:
    if: always()
    needs: [build-and-smoke, ec2, resolve-arm-dlami, ec2-arm, test-container-cpu-gpu, test-container-arm64-cpu-gpu]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
