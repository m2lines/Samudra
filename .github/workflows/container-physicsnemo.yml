# Build (and for main/manual runs, publish and test) the PhysicsNeMo-based container on x86 Linux.
name: Container PhysicsNeMo 25.11

# Docker caching system references:
# - https://www.blacksmith.sh/blog/cache-is-king-a-guide-for-docker-layer-caching-in-github-actions
# - https://docs.docker.com/build/cache/backends/gha/

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-smoke:
    runs-on: ubuntu-24.04-4-core
    env:
      LOCAL_IMAGE_TAG: ocean-emulator:physicsnemo-25.11-${{ github.sha }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Confirm x86_64 runner
        run: |
          arch="$(uname -m)"
          echo "runner arch=${arch}"
          test "${arch}" = "x86_64"

      - name: Reclaim runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:"
          df -h

          # Remove large preinstalled SDKs that are not used by this workflow.
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/vcpkg
          sudo swapoff -a || true
          sudo rm -f /swapfile || true

          # Move Docker root to the larger ephemeral mount on GitHub runners.
          if [ -d /mnt ]; then
            sudo mkdir -p /mnt/docker-data
            echo '{"data-root":"/mnt/docker-data"}' | sudo tee /etc/docker/daemon.json >/dev/null
            sudo systemctl restart docker
          fi

          echo "Disk usage after cleanup:"
          df -h
          docker info | grep "Docker Root Dir"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute GHCR image name
        run: |
          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "GHCR_IMAGE=ghcr.io/${owner_lower}/ocean-emulator-physicsnemo" >> "${GITHUB_ENV}"

      - name: Build container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.physicsnemo-25.11
          load: true
          tags: ${{ env.LOCAL_IMAGE_TAG }}
          build-args: |
            VCS_REF=${{ github.sha }}
            VCS_URL=${{ github.server_url }}/${{ github.repository }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && format('type=registry,ref={0}:buildcache,mode=max', env.GHCR_IMAGE) || '' }}

      - name: Publish image
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          set -euo pipefail

          sha_tag="${GHCR_IMAGE}:25.11-${GITHUB_SHA}"
          docker tag "${LOCAL_IMAGE_TAG}" "${sha_tag}"
          docker push "${sha_tag}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            ref_tag="${GHCR_IMAGE}:25.11-manual-${GITHUB_REF_NAME//\//-}"
            docker tag "${LOCAL_IMAGE_TAG}" "${ref_tag}"
            docker push "${ref_tag}"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            latest_tag="${GHCR_IMAGE}:25.11-latest"
            docker tag "${LOCAL_IMAGE_TAG}" "${latest_tag}"
            docker push "${latest_tag}"
          fi

  ec2:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build-and-smoke
    uses: Open-Athena/ec2-gha/.github/workflows/runner.yml@v2
    with:
      ec2_instance_type: g6.xlarge
      ec2_image_id: ami-0365bff494b18bf93 # Deep Learning OSS Nvidia Driver AMI GPU PyTorch 2.7 (Ubuntu 22.04) in oa-ci-dev
      ec2_root_device_size: 200 # large image pull + test data/cache need substantial headroom
      aws_tags: '[{"Key": "project", "Value": "fomo"}]'
    secrets:
      GH_SA_TOKEN: ${{ secrets.GH_SA_TOKEN }}

  test-container-cpu-gpu:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [build-and-smoke, ec2]
    runs-on: ${{ needs.ec2.outputs.id }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Cache test data
        uses: actions/cache@v3
        with:
          path: .data_cache/
          key: ${{ runner.os }}-test-data-${{ hashFiles('tests/conftest.py', 'configs/test/*.yaml') }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute GHCR image name
        run: |
          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "GHCR_IMAGE=ghcr.io/${owner_lower}/ocean-emulator-physicsnemo" >> "${GITHUB_ENV}"

      - name: Show disk before pull
        run: |
          df -h
          docker system df || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild image from registry cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.physicsnemo-25.11
          load: true
          tags: test-image:latest
          build-args: |
            VCS_REF=${{ github.sha }}
            VCS_URL=${{ github.server_url }}/${{ github.repository }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache

      - name: Set TEST_IMAGE env var
        run: echo "TEST_IMAGE=test-image:latest" >> "${GITHUB_ENV}"

      - name: Run CPU tests in container
        timeout-minutes: 90
        run: |
          docker run --rm \
            --ipc=host \
            -v "${GITHUB_WORKSPACE}/.data_cache:/workspace/.data_cache" \
            --workdir /workspace \
            --entrypoint bash \
            "${TEST_IMAGE}" -lc '
              set -euo pipefail
              . .venv/bin/activate
              python -m pytest -p no:zarr -n 2 -v -m "not manual and not cuda"
            '

      - name: Run GPU tests in container
        timeout-minutes: 90
        run: |
          docker run --rm --gpus all \
            --ipc=host \
            -v "${GITHUB_WORKSPACE}/.data_cache:/workspace/.data_cache" \
            --workdir /workspace \
            --entrypoint bash \
            "${TEST_IMAGE}" -lc '
              set -euo pipefail
              . .venv/bin/activate
              python -m pytest -p no:zarr -v -m "not manual and cuda" -x
            '

  report-container-test-status:
    if: always()
    needs: [build-and-smoke, ec2, test-container-cpu-gpu]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
