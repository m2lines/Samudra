name: Container Post-Publish Tests

on:
  workflow_run:
    workflows:
      - Container PhysicsNeMo 25.11
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to test (e.g. 25.11-latest or 25.11-<sha>)"
        required: false
        default: "25.11-latest"
      checkout_ref:
        description: "Git ref/sha to checkout for tests"
        required: false
        default: "main"

permissions:
  id-token: write
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-target:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
    steps:
      - name: Resolve image and checkout ref
        id: resolve
        run: |
          set -euo pipefail
          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          base_image="ghcr.io/${owner_lower}/ocean-emulator-physicsnemo"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            image_tag="${{ github.event.inputs.image_tag }}"
            checkout_ref="${{ github.event.inputs.checkout_ref }}"
          else
            image_tag="25.11-${{ github.event.workflow_run.head_sha }}"
            checkout_ref="${{ github.event.workflow_run.head_sha }}"
          fi

          echo "image=${base_image}:${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "checkout_ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"

  ec2:
    needs: resolve-target
    uses: Open-Athena/ec2-gha/.github/workflows/runner.yml@v2
    with:
      ec2_instance_type: g6.xlarge
      ec2_image_id: ami-0365bff494b18bf93 # Deep Learning OSS Nvidia Driver AMI GPU PyTorch 2.7 (Ubuntu 22.04) in oa-ci-dev
      ec2_root_device_size: 200 # large image pull + test data/cache need substantial headroom
      aws_tags: '[{"Key": "project", "Value": "fomo"}]'
    secrets:
      GH_SA_TOKEN: ${{ secrets.GH_SA_TOKEN }}

  test-container-cpu-gpu:
    needs: [resolve-target, ec2]
    runs-on: ${{ needs.ec2.outputs.id }}
    env:
      IMAGE: ${{ needs.resolve-target.outputs.image }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.checkout_ref }}

      - name: Cache test data
        uses: actions/cache@v3
        with:
          path: .data_cache/
          key: ${{ runner.os }}-test-data-${{ hashFiles('tests/conftest.py', 'configs/test/*.yaml') }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show disk before pull
        run: |
          df -h
          docker system df || true

      - name: Pull published image
        run: |
          docker pull "${IMAGE}"
          echo "TEST_IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Run CPU tests in container
        timeout-minutes: 90
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            --workdir /repo \
            --entrypoint bash \
            "${TEST_IMAGE}" -lc '
              set -euo pipefail
              . /workspace/.venv/bin/activate
              export PYTHONPATH="/repo/src:${PYTHONPATH:-}"
              python -m pytest -n 2 -v -m "not manual and not cuda"
            '

      - name: Run GPU tests in container
        timeout-minutes: 90
        run: |
          docker run --rm --gpus all \
            -v "${GITHUB_WORKSPACE}:/repo" \
            --workdir /repo \
            --entrypoint bash \
            "${TEST_IMAGE}" -lc '
              set -euo pipefail
              . /workspace/.venv/bin/activate
              export PYTHONPATH="/repo/src:${PYTHONPATH:-}"
              python -m pytest -n 2 -v -m "not manual and cuda" -x
            '

  report-container-test-status:
    if: always()
    needs: [resolve-target, ec2, test-container-cpu-gpu]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
