name: Data Tests

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "*"

jobs:
  build:
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 🫙 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # checkout tags (which is not done by default)
      - name: 🔁 Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: data/pyproject.toml
      - name: 🎯 Check cache hit
        run: echo '${{ steps.setup-python.outputs.cache-hit }}'
      - name: 🌈 Install ocean_preprocessing package
        shell: bash -l {0}
        run: |
          python -m pip install -e "./data[test]"
      - name: 🔎 Check current version
        run: python -c "import ocean_preprocessing; print(ocean_preprocessing.__version__)"
      - name: 🏄‍♂️ Run Tests
        shell: bash -l {0}
        run: |
          cd data/
          pytest tests -v
