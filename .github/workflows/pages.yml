name: docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["Benchmark"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff

      - name: Build API docs with Zensical
        run: uv run --only-group docs zensical build

      - name: Copy static pages into build output
        run: cp -R docs/static/. site/

      # Benchmark results are pushed to the gh-pages branch by benchmarks.yml
      # via benchmark-action/github-action-benchmark. We bring those files into
      # the artifact so they're served at /dev/bench/ alongside the docs site.
      - name: Check out benchmark data from gh-pages
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: gh-pages
          path: gh-pages-data

      - name: Copy benchmark dashboard into build output
        run: |
          if [ -d gh-pages-data/dev/bench ]; then
            mkdir -p site/dev/bench
            cp -R gh-pages-data/dev/bench/. site/dev/bench/
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
