# yaml-language-server: $schema=schemas/EvalConfig.json

debug: true
save_zarr: true
disk_mode: true
inference_time:
  start: "0311-01-01"
  end: "0351-01-01"
num_model_steps_forward: 200

experiment:
  name: local_cm4_samudra
  rand_seed: 15
  base_output_dir: /global/cfs/cdirs/m4874/suryad/Predictions_Zarr_25Mar-19May2025/
  gantry: false
  wandb:
    mode: online
    project: ocean-emulator
    entity: ai2cm
    group: samudra-inference-1in1out
  network: Samudra
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds

data: !include data/cm4.yaml

samudra:
  ch_width: [157, 200, 250, 300, 400]
  n_out: 77
  dilation: [1, 2, 4, 8]
  n_layers: [1, 1, 1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 4
    norm: "instance"

  corrector:
    non_negative_corrector_names:
      - "so"
    ocean_heat_corrector: true

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"