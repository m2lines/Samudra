# yaml-language-server: $schema=schemas/EvalConfig.json
# Eval config for train_om4_crps_dynamic_big.yaml (conditional_norm mode)
# DETERMINISTIC MODE: No noise injection for stable rollout

debug: false
save_zarr: true
disk_mode: true
inference_time:
  start: "2014-10-10"
  end: "2022-12-24"
num_model_steps_forward: 25
noise_enabled: false  # Disable noise for deterministic inference

experiment:
  name: eval_om4_crps_dynamic_big_deterministic
  rand_seed: 15
  base_output_dir: /scratch/ag11542/eval_outputs
  wandb:
    mode: online
    project: ocean-emulators
    entity: m2lines
    group: samudra-eval-om4-crps
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds_hfds_anom

data: !include data/public.yaml

model:
  # Must match train_om4_crps_dynamic_big.yaml architecture
  noise_mode: conditional_norm
  noise_resolution: [32, 32]
  noise_channels: 8
  # Warmup settings not needed for eval - uses full noise
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  unet:
    ch_width: [200, 250, 300, 400]
    dilation: [1, 2, 4, 8]
    n_layers: [1, 1, 1, 1]

    core_block:
      block_type: "conv_next_block"
      kernel_size: 3
      activation: "capped_gelu"
      upscale_factor: 4
      norm: "batch"

    down_sampling_block: "avg_pool"
    up_sampling_block: "bilinear_upsample"

  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false
