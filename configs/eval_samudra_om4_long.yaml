debug: true
save_zarr: true
disk_mode: true
inference:
  start_time: "2014-01-03"
  end_time: "2113-12-20"
ckpt_path: /this/path/does/not/exist # Fill in script
num_model_steps_forward: 20
record_every: 10

experiment:
  name: eval
  sub_name: local_om4_samudra
  rand_seed: 15
  base_output_dir: .LOCAL
  gantry: false
  cluster_data_dir: null
  wandb:
    mode: online
    project: ocean_emu_om4_reviews
    entity: suryadheeshjith
    group: samudra-inference-long
  network: convnextunet
  exp_num_in: 3D_all
  exp_num_extra: 3D_all_hfds_anom
  exp_num_out: 3D_all

data:
  data_path: 3D_data_OM4_5daily_v0.2.1_with_hfds_anom_104_years_2014_netzerohfds
  data_means_path: 3D_data_OM4_5daily_v0.2.1_with_hfds_anom_104_years_2014_netzerohfds_means
  data_stds_path: 3D_data_OM4_5daily_v0.2.1_with_hfds_anom_104_years_2014_netzerohfds_stds
  scaling_residuals_file: null
  depth_mode: all
  time_delta: 5
  num_workers: 4
  hist: 1


unet:
  ch_width: [157, 200, 250, 300, 400]
  n_out: 77
  dilation: [1, 2, 4, 8]
  n_layers: [1, 1, 1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 4
    norm: "batch"

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"
