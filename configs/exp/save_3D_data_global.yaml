# @package _global_
defaults:
  - _self_

### experiment args
experiment: save_data
output_dir: ${join_path:${hydra:sweep.dir},${hydra:sweep.subdir}}
data_overlay: ''
data_dir: ${join_path:${hydra:sweep.dir},${hydra:sweep.subdir}, 'data'}
rand_seed: 1
device: "cuda"

# Parameters
exp_num_in: "3D"
exp_num_extra: "3D"
exp_num_out: "3D"
region: "global_1"
depth_mode: null
N_samples:  4000 #4000
N_val:  140 #300
N_test: 600 #500
steps: 4
interval: 1
hist: 0
lag: 1
lam: 0.05
Nb: 0
factor: 10
lateral: false
