# @package _global_
defaults:
  - _self_
  - swin: swin

wandb:
  mode: disabled # online, disabled
  project: 3D_ocean_emu
  entity: suryadheeshjith
  group: null
  tags: null
  notes: null

### experiment args
experiment: train_3D
output_dir: ${join_path:${hydra:sweep.dir},${hydra:sweep.subdir}}
data_overlay: ''
data_dir: /dummy
nets_dir: ${join_path:${hydra:sweep.dir},${hydra:sweep.subdir}, 'saved_nets'}
rand_seed: 1


#####
region: global_3D # "global_21"
depth_mode: all
network: "swin"
scheduler: False
loss: mse
testing: False
preload: null
data_percent: 1.0
#####


device: "cuda"
distributed: True
disk_mode: True
num_workers: 4
pin_mem: True
save_freq: 5
epochs: 100
batch_size: 32
# grad_clip: False

# Optimizer
lr: 2e-4
T: ${epochs} # 10 # CosineA / CosineAWarm param

# Parameters
exp_num_in: "3D_all"
exp_num_extra: "3D_all"
exp_num_out: "3D_all"
N_samples:  4000 #4000
N_val:  140 #300
N_test: 600 #500
steps: 4
interval: 1
hist: 0
lag: 1
lam: 0.05
Nb: 0
factor: 10
lateral: false

### Do not touch these
# distributed args
dist_url: null
world_size: null
rank: null
gpu: null
dist_backend: null
