# yaml-language-server: $schema=../schemas/FOMiniConfig.json

# TODO: Sweep pred_residuals: true after the one-step MSE baseline.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "all"
perceiver_implementation: "flash"
embedding_dim: 1024
input_num_freq_bands: 4
queries_dim: 1024
coordinate_embedding_dim: 512
query_chunk_size: null
output_head_hidden_dim: 1024
output_channel_chunk_size: 16

perceiver:
  # 2560 latents is a 5x increase over the 512-latent baseline, aimed at
  # testing whether coarse latent spatial capacity is limiting velocity fields.
  depth: 4
  latent_dim: 2304
  num_latents: 2560
  cross_heads: 8
  cross_head_dim: 64
