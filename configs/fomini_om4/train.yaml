# yaml-language-server: $schema=../schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 0.0001
scheduler: { type: cosine }
loss: mse
finetune: false
resume_ckpt_path: null
test_using_ema: false
inference_epochs: []
data_percent: 1.0
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times:
  - start: "1975-01-03"
    end: "1976-01-03"
  - start: "1985-01-03"
    end: "1986-01-03"
  - start: "1995-01-03"
    end: "1996-01-03"
  - start: "2004-10-05"
    end: "2005-10-05"
data_stride: [1]
# TODO: If one-step MSE learns, try rollout curriculum:
# steps: [1, 4]
# step_transition: [2]  # or [3]
steps: [1]
step_transition: []
preemptible: false

backend: auto

experiment:
  name: fomini_om4
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
data: !include ../data/om4.yaml
model: !include model.yaml
