# yaml-language-server: $schema=../schemas/FOMOConfig.json

pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "all"
embedding_dim: 280

encoder:
  patch_size: [12, 20]
  perceiver:
    depth: 3
    latent_dim: 64
    num_latents: 256

processor:
  ch_width: [380, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "batch"

  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
