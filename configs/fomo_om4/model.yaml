# yaml-language-server: $schema=../schemas/FOMOConfig.json

pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "all"
embedding_dim: 64  # Halved from 128 to fit finer patch extent in memory.
perceiver_implementation: "flash"
# 120x144 latent grid (4x finer than previous 60x72 with [3.0, 5.0]).
patch_extent: [1.5, 2.5]

encoder:
  perceiver:
    depth: 2
    latent_dim: 32  # Reduced from 48
    num_latents: 64  # Reduced from 128

decoder:
  perceiver:
    depth: 2
    latent_dim: 32
    num_latents: 64
  queries_dim: 32
  window_patches: 12  # Divides 120 and 144 evenly.
  context_patches: 1

processor:
  ch_width: [96, 128, 160]  # Roughly halved from [200, 256, 320] to compensate for 4x larger latent grid.
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "batch"
    pointwise_linear: true

  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
