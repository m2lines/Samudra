# yaml-language-server: $schema=../schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 1  # bs=2 OOMs on 1/4°
# v35-v38 tried per_scale_batch_size=[1,2,2]/[1,2,4] to lift GPU util,
# but the FOMO model crashes with CUDA illegal-mem at bs>1 in any group
# (likely a latent bug in the model — even CUDA_LAUNCH_BLOCKING couldn't
# surface a Python frame; the abort happens in a TensorImpl destructor).
# Reverting to uniform bs=1 to land on v31's known-good baseline. The
# per-scale sampler infrastructure stays in place for a future debug pass.
per_scale_batch_size: null
gradient_accumulation_steps: 1
learning_rate: 0.0003
scheduler: { type: cosine }
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: .10
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times:
  - start: "1975-01-03"
    end: "1976-01-03" # "1985-01-03"
  - start: "1985-01-03"
    end: "1986-01-03" # "1995-01-03"
  - start: "1995-01-03"
    end: "1996-01-03" # "2005-01-03"
  - start: "2004-10-05"
    end: "2005-10-05" # "2014-10-05"
data_stride: [1]
steps: [1, 2, 4]  # v49: cap at 4-step; 8-step makes climatology the MSE-optimal policy
step_transition: [20, 45]  # 1-step ep 0-19 (clear v48's epoch-19 wall), 2-step ep 20-44 (collapse/sawtooth diagnostic window), 4-step ep 45-69 (rollout fine-tune)
preemptible: true

backend: auto

experiment:
  name: fomo_om4
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
  train_schedule: match
data:
  hist: 1  # v49: revert to 1 (v48 hist=0 collapsed to climatology — model needs temporal context to stay on trajectory)
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_all
    boundary_vars_key: tau_hfds
  static_data_vars: []
  concurrent_compute: true
  loading:
    type: cpu
    num_workers: 4
  sources:
    - data_location: om4_quarterdeg_v2/OM4.zarr
      data_means_location: om4_quarterdeg_v2/OM4_means.zarr
      data_stds_location: om4_quarterdeg_v2/OM4_stds.zarr
    - data_location: om4_halfdeg_v4/OM4.zarr
      data_means_location: om4_halfdeg_v4/OM4_means.zarr
      data_stds_location: om4_halfdeg_v4/OM4_stds.zarr
    - data_location: om4_onedeg_v3/OM4.zarr
      data_means_location: om4_onedeg_v3/OM4_means.zarr
      data_stds_location: om4_onedeg_v3/OM4_stds.zarr
model: !include model.yaml
