debug: false
save_zarr: true
disk_mode: true
inference:
  start_time: "0311-01-01"
  end_time: "0351-01-01"
ckpt_path: /ckpt.pt
num_model_steps_forward: 20
record_every: 10
backend: auto

experiment:
  base_name: eval
  sub_name: cm4_samudra
  rand_seed: 15
  base_output_dir: /results
  gantry: true
  cluster_data_dir: /
  wandb:
    mode: online
    project: ocean-emulator
    entity: ai2cm
    group: samudra-inference-2in2out
  network: Samudra
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds

data:
  data_path: /climate-default/2025-02-10-cm4-piControl-ocean-200yr-dataset/data_uncompressed.zarr
  data_means_path: /statsdata/centering.nc
  data_stds_path: /statsdata/scaling-full-field.nc
  scaling_residuals_file: null
  num_workers: 4
  hist: 1


samudra:
  ch_width: [157, 200, 250, 300, 400]
  n_out: 77
  dilation: [1, 2, 4, 8]
  n_layers: [1, 1, 1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 4
    norm: "batch"

  corrector:
    non_negative_corrector_names:
      - "so"

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"