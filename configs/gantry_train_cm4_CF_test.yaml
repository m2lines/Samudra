debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 120
batch_size: 3
learning_rate: 0.0001
scheduler: false
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: [-1]
data_percent: 1.0
train:
  start_time: "0250-01-06"
  end_time: "0270-01-01"
val:
  start_time: "0306-01-01"
  end_time: "0311-01-01"
inference:
  - start_time: "0151-01-06"
    end_time: "0161-01-11"
  - start_time: "0161-01-06"
    end_time: "0171-01-11"
  - start_time: "0171-01-06"
    end_time: "0181-01-11"
  - start_time: "0181-01-06"
    end_time: "0191-01-11"
  - start_time: "0191-01-06"
    end_time: "0201-01-11"
  - start_time: "0201-01-06"
    end_time: "0211-01-11"
  - start_time: "0211-01-06"
    end_time: "0221-01-11"
  - start_time: "0221-01-06"
    end_time: "0231-01-11"
data_stride: [1]
steps: [4]
step_transition: []
backend: auto

experiment:
  base_name: train
  sub_name: cm4_samudra
  rand_seed: 1
  base_output_dir: /results
  gantry: true
  cluster_data_dir: /
  wandb:
    mode: online
    project: ocean-emulators
    entity: m2lines
    group: crossformer-test
  network: CrossFormer
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds

data:
  data_path: /climate-default/2025-02-10-cm4-piControl-ocean-200yr-dataset/data_uncompressed.zarr
  data_means_path: /statsdata/centering.nc
  data_stds_path: /statsdata/scaling-full-field.nc
  scaling_residuals_file: null
  time_delta: 5
  num_workers: 4
  hist: 1

crossformer:
  n_in: 157
  n_out: 77
  pred_residuals: false
  image_height: 180
  patch_height: 1
  image_width: 360
  patch_width: 1
  dims: [200, 400, 800, 1600]
  depth: [2, 2, 8, 2]
  dim_head: 32
  global_window_size: [8, 4, 2, 1]
  local_window_size: 4
  cross_embed_kernel_sizes:
    - [4, 8, 16, 32]
    - [2, 4]
    - [2, 4]
    - [2, 4]
  cross_embed_strides: [2, 2, 2, 2]
  attn_dropout: 0.
  ff_dropout: 0.
  use_spectral_norm: true
  interp: true
  padding_conf:
    pad_lat: [6, 6]
    pad_lon: [12, 12]
