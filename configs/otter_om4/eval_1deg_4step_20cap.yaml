# Match the official one-degree v2 evaluation interval and rollout horizon.
debug: false
save_zarr: true
disk_mode: true
inference_time:
  start: "2014-10-10"
  end: "2022-12-24"
num_model_steps_forward: 25

experiment:
  name: otter_om4_1deg_4step_20cap_eval
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
data: !include ../data/om4.yaml
model: !include model.yaml
