# yaml-language-server: $schema=../schemas/TrainConfig.json

# Otter counterpart to the official one-degree v2 20-cap run. This keeps
# history at one and matches its four-step rollout, dynamic MSE objective,
# forcing variables, data split, effective global batch, and training length.
debug: false
disk_mode: true
pin_mem: true
save_freq: 5
validation_image_log_freq: 10
epochs: 70
batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 0.0006
scheduler:
  type: cosine
loss:
  type: dynamic
  metric: mse
  limit: 20
finetune: false
resume_ckpt_path: null
inference_epochs: []
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times: []
data_stride: [1]
steps: [4]
step_transition: []
preemptible: false

backend: auto

experiment:
  name: otter_om4_1deg_4step_20cap
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
data: !include ../data/om4.yaml
model: !include model.yaml
