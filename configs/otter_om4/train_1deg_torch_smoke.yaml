# yaml-language-server: $schema=../schemas/TrainConfig.json

# A bounded full-width GPU smoke: eight 5-day training samples and four
# validation samples on the one-degree grid.
debug: false
disk_mode: true
pin_mem: true
save_freq: 1
epochs: 1
batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 0.0006
scheduler: null
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
train_time:
  start: "1975-01-03"
  end: "1975-02-12"
val_time:
  start: "1975-02-12"
  end: "1975-03-04"
inference_times: []
data_stride: [1]
steps: [1]
step_transition: []
preemptible: false

backend: auto

experiment:
  name: otter_om4_1deg_torch_smoke
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_all
    boundary_vars_key: tau_hfds
  static_data_vars: []
  concurrent_compute: true
  loading:
    type: cpu
    num_workers: 16
    persistent_workers: true
  sources:
    - data_location: OM4.zarr
      data_means_location: OM4_means.zarr
      data_stds_location: OM4_stds.zarr
model: !include model.yaml
