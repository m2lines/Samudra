# yaml-language-server: $schema=../schemas/TrainConfig.json

# Short pedagogical run for notebooks/quickstart.ipynb. The notebook downloads
# 250 five-day timesteps of public 1° OM4 data, the minimum window needed to
# include the configured validation end date.
debug: false
disk_mode: true
pin_mem: true
save_freq: 2
epochs: 5
batch_size: 1
preemptible: false
learning_rate: 0.0006
gradient_accumulation_steps: 1
scheduler: { type: cosine }
loss:
  type: dynamic
  metric: mse
  limit: 20
finetune: false
resume_ckpt_path: null
inference_epochs: []

train_time:
  start: "1958-02-01"
  end: "1960-12-01"
val_time:
  start: "1960-12-01"
  end: "1961-06-01"
inference_times: []

data_stride: [1]
steps: [1]
step_transition: []
backend: auto

experiment:
  name: samudra_quickstart
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: samudra-quickstart

data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_5
    boundary_vars_key: tau_hfds
  sources:
    - data_location: OM4.zarr
      data_means_location: OM4_means.zarr
      data_stds_location: OM4_stds.zarr
  loading:
    type: cpu
    num_workers: 0
    persistent_workers: false
  hist: 0
  static_data_vars: []

model: !include model.yaml
