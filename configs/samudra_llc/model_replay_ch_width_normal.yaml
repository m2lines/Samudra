# yaml-language-server: $schema=../schemas/SamudraConfig.json

checkpointing: all
pred_residuals: true
last_kernel_size: 3
pad: "constant"
# `halo_sponge` keeps the same loaded LLC patch but reweights the outer edge:
# halo pixels get zero loss weight, sponge pixels ramp inward toward 1.
num_halo: 4
num_sponge: 12
use_bfloat16: true

unet:
  ch_width: [256, 384, 512, 512]  # [192, 288, 384, 384] 
  dilation: [1, 2, 4, 8]
  n_layers: [1, 1, 1, 1]

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "group"
    group_norm_groups: 32

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"

corrector:
  non_negative_corrector_names: null
  ocean_heat_corrector: false
