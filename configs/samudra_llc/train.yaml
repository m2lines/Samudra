# yaml-language-server: $schema=../schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 1
epochs: 5
batch_size: 1
learning_rate: 0.0006
gradient_accumulation_steps: 4
scheduler: { type: cosine }
loss: mse
 # type: dynamic
#  metric: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0
train_time:
  start: "2011-09-01" # "2011-09-13"
  end: "2011-11-15" # "2011-09-14"
val_time:
  start: "2012-09-01" # "2011-09-15"
  end: "2012-10-01" # "2011-09-16"
inference_times:
  - start: "2012-10-01"
    end: "2012-11-01"
data_stride: [1]
steps: [1,2,4]
step_transition: [1,2]
preemptible: false

backend: auto

experiment:
  name: 2026-03-27-samudra_llc:Agulhas_patch:3_EPOCH_VARIABLE_STEP_TEST(with-noise_injection,group_norm,pred_resid=true)
  data_root: /orcd/data/abodner/
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: online #disabled
    project: default
  prognostic_vars_key: all #single1
  boundary_vars_key: all

data: !include ../data/llc.yaml
model: !include model.yaml