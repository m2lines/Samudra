# yaml-language-server: $schema=../schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 1
epochs: 5
batch_size: 1
learning_rate: 0.0006
gradient_accumulation_steps: 4
scheduler: { type: cosine }
loss: mse
 # type: dynamic
#  metric: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0
train_time:
  start: "2011-09-14"
  end: "2012-09-13"
val_time:
  start: "2012-09-14" # "2011-09-15"
  end: "2012-10-01" # "2011-09-16"
inference_times:
  - start: "2012-10-01"
    end: "2012-11-01"
data_stride: [1]
temporal_stride: 5
steps: [1]
step_transition: []
preemptible: false

backend: auto

experiment:
  name: 2026-03-30-CONT:2026-03-29-samudra_llc:Agulhas_patch:group_norm=32(divisible_channels=[256,384,512,512]),pred_resid=false,1yr,temporal_stride=6-11154413.out-WITH-temporal_stride=5,noise=low,no_frontal_noise
  data_root: /orcd/data/abodner/
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: online #disabled
    project: default
  prognostic_vars_key: all #single1
  boundary_vars_key: all

data: !include ../data/llc.yaml
model: !include model.yaml
