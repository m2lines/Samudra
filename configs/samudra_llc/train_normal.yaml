# yaml-language-server: $schema=../schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 1
epochs: 1
batch_size: 1
learning_rate: 0.0006
gradient_accumulation_steps: 4
scheduler: { type: cosine }
loss:
  type: [gradient_h, TS-gradient_z] # gradient_h # 
  metric: mse_mae
  lambda_h: 0.1
  lambda_z: 0.1
finetune: false
resume_ckpt_path: null
reset_optimizer_on_resume: false
reset_scheduler_on_resume: false
inference_epochs: []
data_percent: 1.0
train_time:
  start: "2011-09-13" #"2011-09-13"
  end: "2012-09-13"   # "2011-11-13" 
val_time:
  start: "2012-09-14" # "2011-09-15"
  end: "2012-10-14" # "2011-09-16"
inference_times:
  - start: "2012-10-14"
    end: "2012-11-14"
data_stride: [1]
temporal_stride: 24
steps: [1]
step_transition: []
preemptible: false

backend: auto

experiment:
  name: 2026-06-01:samudra_llc:A-3
  data_root: /orcd/data/abodner/
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: online #disabled
    project: default
  prognostic_vars_key: all #single1
  boundary_vars_key: all

data: !include ../data/llc_normal.yaml
model: !include model_normal.yaml
