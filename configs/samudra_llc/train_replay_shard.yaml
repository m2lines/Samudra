# yaml-language-server: $schema=../schemas/TrainConfig.json

# Phase 3 gate: one 2x2 domain cluster, local-shard replay state, and simple MSE.
debug: true
disk_mode: true
pin_mem: true
save_freq: 1
epochs: 1
batch_size: 1
learning_rate: 0.0006
gradient_accumulation_steps: 1
scheduler: { type: cosine }
replay:
  enabled: true
  buffer_size: 8
  refresh_every_n_microbatches: 4
  refresh_every_n_microbatches_transition: []
  steps_per_epoch: 64
  max_lead_steps: [4]
  max_lead_transition: []
  # Domain replay resume/sidecars are deliberately deferred.
  checkpoint_buffer: false
loss: mse
finetune: false
resume_ckpt_path: null
reset_optimizer_on_resume: false
reset_scheduler_on_resume: false
inference_epochs: []
data_percent: 1.0
train_time:
  start: "2011-09-13"
  end: "2012-09-13"
val_time:
  start: "2012-09-14"
  end: "2012-10-14"
inference_times:
  - start: "2012-10-14"
    end: "2012-11-14"
data_stride: [1]
temporal_stride: 1
temporal_stride_transition: []
steps: [1]
step_transition: []
lr_multipliers: [1.0]
lr_multiplier_transition: []
preemptible: false
emergency_checkpoint_interval_minutes: 0
backend: nccl
domain_parallel:
  enabled: true
  cluster_shape: [2, 2]
  use_fsdp: false
  leader_scatter: true
  strict_equivalence: false

experiment:
  name: shardtensor-replay-2x2-DEBUG
  data_root: /orcd/data/abodner/
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: online
    project: default
  prognostic_vars_key: all
  boundary_vars_key: all

data: !include ../data/llc_normal.yaml
model: !include model_replay.yaml
