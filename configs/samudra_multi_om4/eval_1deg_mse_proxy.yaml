# yaml-language-server: $schema=../schemas/EvalConfig.json

debug: false
save_zarr: true
disk_mode: true
inference_time:
  start: "2014-10-05"
  # Four five-day timestamps produce exactly one prediction for hist=1.
  end: "2014-10-20"
num_model_steps_forward: 1

experiment:
  name: samudra_multi_om4_1deg_mse_proxy_eval
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default

data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_all
    boundary_vars_key: tau_hfds
  static_data_vars: []
  concurrent_compute: true
  sources:
    - data_location: om4_onedeg_v3/OM4.zarr
      data_means_location: om4_onedeg_v3/OM4_means.zarr
      data_stds_location: om4_onedeg_v3/OM4_stds.zarr

model: !include model.yaml
