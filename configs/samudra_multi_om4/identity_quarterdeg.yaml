# yaml-language-server: $schema=../schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 30
epochs: 30
batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 0.0006
scheduler: null
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times: []
data_stride: [1]
steps: [1]
step_transition: []
preemptible: false
test_using_ema: false

backend: auto

experiment:
  name: samudra_multi_identity_quarterdeg
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
  train_schedule: match
data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_all
    boundary_vars_key: tau_hfds
  static_data_vars: []
  concurrent_compute: true
  hist: 1
  loading:
    type: rust
    prefetch_batches: 2
    max_concurrent_reads: 4
    prefetch_to_device: true
  sources:
    - data_location: om4_quarterdeg_v2/OM4.zarr
      data_means_location: om4_quarterdeg_v2/OM4_means.zarr
      data_stds_location: om4_quarterdeg_v2/OM4_stds.zarr
model: !include model.yaml
