# yaml-language-server: $schema=../schemas/SamudraMultiConfig.json

# Decoder-localization control: a direct one-cell encoder, no processor, and a
# Perceiver IO decoder whose true input/output cross-attention path is 128 wide.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "selective"
embedding_dim: 128
perceiver_implementation: "flash"
patch_extent: [1.0, 1.0]
bypass_processor: true
processor_iterations: 0

encoder:
  direct_projection: true

decoder:
  perceiver:
    depth: 2
    latent_dim: 128
    num_latents: 256
    cross_heads: 2
    cross_dim_head: 64
  queries_dim: 128
  window_patches: 12
  context_patches: 1
  window_batch_size: 1

processor:
  ch_width: [380, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "instance"
    pointwise_linear: true

  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
