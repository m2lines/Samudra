# yaml-language-server: $schema=../schemas/SamudraMultiConfig.json

# One spatial processor token per one-degree grid cell. The direct projections
# deliberately remove the Perceiver representation bottleneck without adding a
# residual or encoder-to-decoder skip path.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "selective"
embedding_dim: 128
perceiver_implementation: "flash"
patch_extent: [1.0, 1.0]
use_fine_scale_queries: false

encoder:
  direct_projection: true
  perceiver:
    depth: 2
    latent_dim: 64
    num_latents: 256

decoder:
  direct_projection: true
  perceiver:
    depth: 2
    latent_dim: 64
    num_latents: 256
  queries_dim: 64
  window_patches: 12
  context_patches: 1
  window_batch_size: 1

processor:
  ch_width: [380, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "instance"
    pointwise_linear: true

  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
