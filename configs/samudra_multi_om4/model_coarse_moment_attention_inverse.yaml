# yaml-language-server: $schema=../schemas/SamudraMultiConfig.json

# Fixed 3-degree-by-5-degree coarse latent grid. The encoder packs a resolved
# patch-mean route and continuous within-patch moments into channels. The decoder
# uses a coordinate-resampling base plus a zero-initialized continuous local
# attention correction. This is the S0-promoted learned-inverse proxy.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "selective"
embedding_dim: 160
perceiver_implementation: "flash"
patch_extent: [3.0, 5.0]
bypass_processor: true
processor_iterations: 0

encoder:
  geometry_mode: "none"
  patch_moment_count: 16
  patch_mean_channels: 40

decoder:
  continuous_resample_attention_residual: true
  residual_hidden_dim: 160
  residual_heads: 4
  residual_dim_head: 32
  residual_neighborhood_radius: 1
  residual_position_bias_strength: 8.0
  residual_query_chunk_size: 4096

processor:
  ch_width: [160, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]
  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "instance"
    pointwise_linear: true
  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
