# yaml-language-server: $schema=../schemas/SamudraMultiConfig.json

# D0 control for the coarse learned-inverse experiment. This keeps the promoted
# 16-moment encoder but removes the continuous anchored correction, so only
# physical-coordinate bilinear resampling and a pointwise output projection
# unpack each 3x5-degree coarse token.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "selective"
embedding_dim: 160
perceiver_implementation: "flash"
patch_extent: [3.0, 5.0]
bypass_processor: true
processor_iterations: 0

encoder:
  geometry_mode: "none"
  patch_moment_count: 16
  patch_mean_channels: 40

decoder:
  resample_projection: true
  coordinate_resampling: true

processor:
  ch_width: [160, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]
  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "instance"
    pointwise_linear: true
  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
