# yaml-language-server: $schema=../schemas/SamudraMultiConfig.json

# Processor-depth candidate after the one/half-degree spatial-bandwidth diagnosis.
# Native inputs are projected onto the finest configured latent grid, geometry is
# kept in a sidecar, and one shared processor can be applied zero to N times.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "selective"
embedding_dim: 160
perceiver_implementation: "flash"
patch_extent: [1.0, 1.0]
processor_iterations: 1
zero_depth_reconstruction_weight: 0.05

encoder:
  geometry_mode: "sidecar"
  canonical_resampling: true

decoder:
  resample_projection: true
  coordinate_resampling: true

processor:
  ch_width: [160, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]
  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "instance"
    pointwise_linear: true
  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
