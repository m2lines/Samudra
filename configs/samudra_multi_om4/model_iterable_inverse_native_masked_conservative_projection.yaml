# yaml-language-server: $schema=../schemas/SamudraMultiConfig.json

# Physical-time latent transition using the selected inverse and scale-aware
# output transport. The state remains native-grid latent; only the decoder changes
# rendering operator for restrictions of at least 3x along both spatial axes.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "selective"
embedding_dim: 160
perceiver_implementation: "flash"
patch_extent: [1.0, 1.0]
processor_iterations: 1
processor_residual: true
zero_depth_reconstruction_weight: 0.0

encoder:
  geometry_mode: "sidecar"
  native_projection: true

decoder:
  resample_projection: true
  coordinate_resampling: true
  project_before_resample: true
  conservative_restriction_min_ratio: 3.0

processor:
  ch_width: [160, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]
  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "instance"
    pointwise_linear: true
  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
