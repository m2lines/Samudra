# yaml-language-server: $schema=../schemas/SamudraMultiConfig.json

# Processor-depth candidate selected by the S0/S1 learned-inverse funnel. The
# encoder and decoder use the promoted narrow external representation; geometry is
# supplied separately to every processor call rather than added to reconstructable
# content. The deeper processor widths retain the existing capacity control while
# its input/output contract changes from 380 to 128 channels.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "selective"
embedding_dim: 128
perceiver_implementation: "flash"
patch_extent: [1.0, 1.0]
processor_iterations: 1
zero_depth_reconstruction_weight: 0.05

encoder:
  geometry_mode: "sidecar"
  perceiver:
    depth: 2
    latent_dim: 128
    num_latents: 1

decoder:
  resample_projection: true
  coordinate_resampling: true

processor:
  ch_width: [128, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]
  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "instance"
    pointwise_linear: true
  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
