# yaml-language-server: $schema=../schemas/SamudraMultiConfig.json

# Learned-inverse control that preserves native information by projecting every
# input cell into latent channels and resampling onto the finest configured grid.
# The processor therefore sees one fixed physical latent grid at depth zero or N.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "selective"
embedding_dim: 128
perceiver_implementation: "flash"
patch_extent: [1.0, 1.0]
bypass_processor: true
processor_iterations: 0

encoder:
  geometry_mode: "none"
  canonical_resampling: true

decoder:
  resample_projection: true
  coordinate_resampling: true

processor:
  ch_width: [128, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]
  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "instance"
    pointwise_linear: true
  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
