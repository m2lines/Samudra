# yaml-language-server: $schema=../schemas/SamudraMultiConfig.json

# Zero-processor learned-inverse candidate: the physical resampling base plus a
# bounded, zero-initialized local attention correction.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "selective"
embedding_dim: 128
perceiver_implementation: "flash"
patch_extent: [1.0, 1.0]
bypass_processor: true
processor_iterations: 0

encoder:
  geometry_mode: "additive"
  perceiver:
    depth: 2
    latent_dim: 64
    num_latents: 1

decoder:
  resample_attention_residual: true
  residual_hidden_dim: 128
  residual_heads: 2
  residual_dim_head: 64
  residual_neighborhood_radius: 1
  residual_position_bias_strength: 2.0
  residual_normalize_values: false
  residual_query_chunk_size: 4096

processor:
  ch_width: [380, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]
  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "instance"
    pointwise_linear: true
  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
