# yaml-language-server: $schema=../schemas/SamudraMultiConfig.json

# Zero-processor learned-inverse control. The encoder remains learned; the decoder
# renders its canonical grid with physical-coordinate interpolation and a learned
# channel projection.
pred_residuals: false
last_kernel_size: 3
pad: "circular"
checkpointing: "selective"
embedding_dim: 128
perceiver_implementation: "flash"
patch_extent: [1.0, 1.0]
bypass_processor: true
processor_iterations: 0

encoder:
  geometry_mode: "none"
  perceiver:
    depth: 2
    latent_dim: 128
    num_latents: 1

decoder:
  resample_projection: true
  coordinate_resampling: true

processor:
  ch_width: [380, 480, 520]
  dilation: [1, 1, 1]
  n_layers: [1, 1, 1]
  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "instance"
    pointwise_linear: true
  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"
