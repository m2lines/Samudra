# yaml-language-server: $schema=../schemas/TrainConfig.json

# Full-data one-degree, single-step direct-head baseline. The defaults assume
# eight GPUs: batch 2 * eight ranks * two accumulation steps = global batch 32.
debug: false
disk_mode: true
pin_mem: true
save_freq: 5
validation_image_log_freq: 10
epochs: 70
batch_size: 2
gradient_accumulation_steps: 2
learning_rate: 0.0006
scheduler:
  type: cosine
  interval: optimizer_update
  # Retained for exact run reproduction. Final partial accumulation cycles make
  # the 70-epoch run take 6,230 updates; use 6,230 for an exact terminal minimum.
  target_updates: 6160
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times: []
data_stride: [1]
steps: [1]
step_transition: []
preemptible: false
wandb_watch: null

backend: auto

experiment:
  name: samudra_multi_om4_1deg_1cell_direct_mse_updates
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
  train_schedule: match
data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_all
    boundary_vars_key: tau_hfds
  static_data_vars: []
  concurrent_compute: true
  loading:
    type: rust
    prefetch_batches: 2
    max_concurrent_reads: 4
    prefetch_to_device: true
  sources:
    - data_location: om4_onedeg_v3/OM4.zarr
      data_means_location: om4_onedeg_v3/OM4_means.zarr
      data_stds_location: om4_onedeg_v3/OM4_stds.zarr
model: !include model_1cell_direct.yaml
