# yaml-language-server: $schema=../schemas/TrainConfig.json

# Forecast proxy for the selected learned inverse. With eight GPUs, batch two and
# two accumulation steps give effective global batch 32 and 192 updates total.
debug: false
disk_mode: true
pin_mem: true
save_freq: 3
validation_image_log_freq: 6
epochs: 12
batch_size: 2
gradient_accumulation_steps: 2
# Depth N is supervised against t+N after consuming N aligned forcing blocks in
# latent space; one selected lead is trained per batch.
train_processor_depths: [1, 2, 4]
validation_processor_depths: [1, 2, 4]
validation_boundary_ablations: [zero, batch_shuffle, time_reverse]
learning_rate: 0.0006
scheduler:
  type: cosine
  interval: optimizer_update
  target_updates: 6160
loss: mse
finetune: true
finetune_allowed_missing_prefixes:
  [
    "processor.",
    "processor_geometry.",
    "boundary_encoder.",
    "processor_residual_scale",
  ]
frozen_model_prefixes: []
resume_ckpt_path: null
inference_epochs: []
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
train_sample_selection:
  num_samples: 512
  seed: 20260719
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times: []
data_stride: [1]
steps: [4]
step_transition: []
preemptible: false
wandb_watch: null

backend: auto

experiment:
  name: samudra_multi_om4_1deg_latent_ar_masked_mse_proxy
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
  train_schedule: match
data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_all
    boundary_vars_key: tau_hfds
  static_data_vars: []
  concurrent_compute: true
  loading:
    type: rust
    prefetch_batches: 2
    max_concurrent_reads: 4
    prefetch_to_device: true
  sources:
    - data_location: om4_onedeg_v3/OM4.zarr
      data_means_location: om4_onedeg_v3/OM4_means.zarr
      data_stds_location: om4_onedeg_v3/OM4_stds.zarr
model: !include model_iterable_inverse_native_masked_projection.yaml
