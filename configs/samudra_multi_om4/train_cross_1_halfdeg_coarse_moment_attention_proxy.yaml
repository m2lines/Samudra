# yaml-language-server: $schema=../schemas/TrainConfig.json

# S1 learned-inverse proxy for a fixed 60x72 coarse latent grid. The mix schedule
# trains all one/half-degree input/output routes from synchronized OM4 states.
debug: false
disk_mode: true
pin_mem: true
save_freq: 5
validation_image_log_freq: 5
epochs: 10
batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 0.001
scheduler: null
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
train_sample_selection:
  num_samples: 32
  seed: 20260724
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times: []
data_stride: [1]
steps: [1]
step_transition: []
target_time_mode: current
preemptible: false
test_using_ema: false
wandb_watch: null

backend: auto

experiment:
  name: samudra_multi_om4_cross_1_halfdeg_coarse_moment_attention_proxy
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
  train_schedule: mix
data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_all
    boundary_vars_key: tau_hfds
  static_data_vars: []
  concurrent_compute: true
  hist: 1
  loading:
    type: rust
    prefetch_batches: 2
    max_concurrent_reads: 4
    prefetch_to_device: true
  sources:
    - data_location: om4_onedeg_v3/OM4.zarr
      data_means_location: om4_onedeg_v3/OM4_means.zarr
      data_stds_location: om4_onedeg_v3/OM4_stds.zarr
    - data_location: om4_halfdeg_v4/OM4.zarr
      data_means_location: om4_onedeg_v3/OM4_means.zarr
      data_stds_location: om4_onedeg_v3/OM4_stds.zarr
model: !include model_coarse_moment_attention_inverse.yaml
