# yaml-language-server: $schema=../schemas/TrainConfig.json

# S2 causal screen: fit a shared frozen-inverse latent transition from half-degree
# targets only. With one H200 and batch two, 128 examples produce 64 optimizer
# updates per epoch; 12 epochs give 768 updates, evenly split across depths 1/2/4.
debug: false
disk_mode: true
pin_mem: true
save_freq: 3
validation_image_log_freq: 12
epochs: 12
batch_size: 2
gradient_accumulation_steps: 1
train_processor_depths: [1, 2, 4]
validation_processor_depths: [1, 2, 4]
validation_boundary_ablations: [zero, time_reverse]
learning_rate: 0.0006
scheduler:
  type: cosine
  interval: optimizer_update
  target_updates: 768
loss: mse
finetune: true
finetune_allowed_missing_prefixes:
  [
    "processor.",
    "processor_geometry.",
    "boundary_encoder.",
    "processor_residual_scale",
  ]
frozen_model_prefixes: ["encoder.", "decoder."]
resume_ckpt_path: null
inference_epochs: []
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
train_sample_selection:
  num_samples: 128
  seed: 20260724
val_time:
  start: "2013-10-05"
  # Keep per-epoch depth/ablation screening bounded. The separate cross-grid
  # checkpoint audit evaluates the promoted checkpoint over the full year.
  end: "2014-01-05"
inference_times: []
data_stride: [1]
steps: [4]
step_transition: []
preemptible: true
wandb_watch: null

backend: auto

experiment:
  name: samudra_multi_om4_halfdeg_coarse_latent_dynamics_proxy
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
  train_schedule: match
data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_all
    boundary_vars_key: tau_hfds
  static_data_vars: []
  concurrent_compute: true
  loading:
    type: rust
    prefetch_batches: 2
    max_concurrent_reads: 4
    prefetch_to_device: true
  sources:
    - data_location: om4_halfdeg_v4/OM4.zarr
      data_means_location: om4_onedeg_v3/OM4_means.zarr
      data_stds_location: om4_onedeg_v3/OM4_stds.zarr
model: !include model_iterable_inverse_coarse_moment_attention.yaml
