# yaml-language-server: $schema=../schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 4
learning_rate: 0.0006
scheduler: { type: cosine }
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times:
  - start: "1975-01-03"
    end: "1980-01-03"
  - start: "1980-01-03"
    end: "1985-01-03"
  - start: "1985-01-03"
    end: "1990-01-03"
  - start: "1990-01-03"
    end: "1995-01-03"
  - start: "1995-01-03"
    end: "2000-01-03"
  - start: "2000-01-03"
    end: "2005-01-03"
  - start: "2005-01-03"
    end: "2010-01-03"
  - start: "2010-01-03"
    end: "2014-10-05"
data_stride: [1]
temporal_stride: 1
steps: [4]
step_transition: []
preemptible: false

backend: auto

experiment:
  name: samudra_om4_v1
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds_hfds_anom

data: !include ../data/om4.yaml
model: !include model.yaml
