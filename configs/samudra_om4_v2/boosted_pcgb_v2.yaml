# yaml-language-server: $schema=../schemas/PCGBConfig.json

# PCGB v2 — future experiment that searches the FULL path lattice
# (UNet skips + ConvNeXt-block residuals) using mixture sampling with an
# online linear surrogate prior. Run *after* v1 (boosted_pcgb.yaml) shows
# a positive signal so we can compare against a v1 baseline.
#
# Key differences from boosted_pcgb.yaml:
#   * `mask_searcher.type=mixture` (vs. enumerate)
#   * Search space grows from 2^4 = 16 to 2^14 = 16,384 candidates;
#     non-uniform sampling concentrates on plausibly-high-S masks.
#   * `core_block.residual_drop_rate=0.1` enables the conv-block
#     DropPath at training time so the deterministic mask injection has
#     a network that's seen residual drops in its training distribution.

debug: false
disk_mode: true
pin_mem: true

num_rounds: 70                     # matches baseline 70-epoch budget
steps_per_round_epochs: 1.0        # K = 1 epoch / round
mask_searcher:
  type: mixture
  num_skips: 4
  num_blocks: 9               # Matches backbone (4 down + 1 middle + 4 up CoreBlocks).
  num_candidates: 256
  prior_weight: 0.6
  stratified_weight: 0.25
  uniform_weight: 0.15
  surrogate_decay: 0.7        # ~3-round effective window
  prior_temperature: 1.0
  no_repeat_window: 0
  seed: 0
scoring_subset_percent: 0.25

reweight_ema_lambda: 0.3
reweight_clamp_limit: 5.0
reweight_beta_max: 1.0
reweight_enabled: true

calibration_time:
  start: "1975-01-03"
  end: "2013-10-05"
save_round_freq: 2

batch_size: 4
learning_rate: 0.0006
gradient_accumulation_steps: 1
epochs: 70
scheduler: { type: cosine }
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times: []
data_stride: [1]
steps: [1]
step_transition: []
preemptible: false
test_using_ema: false

backend: auto

experiment:
  name: pcgb_samudra_v2
  rand_seed: 15
  base_output_dir: .LOCAL
  train_schedule: standard
  wandb:
    mode: online
    project: default
    entity: ocean_emulators
data: !include ../data/om4.yaml
# v2 enables conv-block residual drops at training time too — the mask
# searcher addresses both axes, so the model needs to be trained to
# tolerate (and benefit from) those drops.
model: !include boosted_model_v2.yaml
