# yaml-language-server: $schema=../schemas/SamudraConfig.json

# Variant of `model.yaml` that swaps the dense-spatial `conv_next_block`
# for the canonical depthwise `true_conv_next_block` and applies
# RepLKNet-style large kernels (Ding et al. 2022, §5.3 + Table 11).
# See `exp_kernel.md` for the experiment design and kernel-size rationale.

checkpointing: all
pred_residuals: false
last_kernel_size: 3
pad: "circular"

unet:
  ch_width: [280, 380, 480, 520]
  # Decreasing kernel sizes from shallow to deep stages, mirroring the
  # RepLKNet-31 pattern. Largest at stage 1 where the feature map is
  # biggest (180×360 at 1°); smallest at stage 4 where the feature map
  # is small (22×45 at 1°) and the effective receptive field is already
  # large via composition.
  kernel_size: [31, 21, 13, 7]
  # No dilation: large depthwise kernels make it redundant, and at deep
  # stages the implied N_pad would exceed the feature-map size.
  dilation: [1, 1, 1, 1]
  n_layers: [1, 1, 1, 1]

  core_block:
    block_type: "true_conv_next_block"
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "batch"

  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"

corrector:
  non_negative_corrector_names: null
  ocean_heat_corrector: false
