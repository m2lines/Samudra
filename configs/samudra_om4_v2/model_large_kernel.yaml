# yaml-language-server: $schema=../schemas/SamudraConfig.json

# Variant of `model.yaml` that swaps the dense-spatial `conv_next_block`
# for the canonical depthwise `true_conv_next_block` and applies large
# depthwise kernels in an increasing shallow-to-deep schedule, motivated
# by the v1 large-kernel run (which used the opposite, decreasing
# schedule and showed a surface-vs-deep trade-off vs Samudra-2).
# See `exp_kernel.md` for the experiment design and kernel-size rationale.

checkpointing: all
pred_residuals: false
last_kernel_size: 3
pad: "circular"

unet:
  ch_width: [280, 380, 480, 520]
  # Increasing kernel sizes from shallow to deep, reversing v1's
  # `[31, 21, 13, 7]`. v1 helped deep-ocean tracking but hurt surface /
  # ENSO; the surface degradation is most consistent with shallow-stage
  # 31×31 smoothing the high-frequency input. By keeping the shallowest
  # stage at 7×7 we preserve surface fidelity, while the deeper stages
  # accumulate the broad-scale context that helped the deep ocean.
  kernel_size: [7, 13, 21, 31]
  dilation: [1, 1, 1, 1]
  n_layers: [1, 1, 1, 1]

  core_block:
    block_type: "true_conv_next_block"
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "batch"

  down_sampling_block: "avg_pool"
  up_sampling_block: "zonally_periodic_upsample"

corrector:
  non_negative_corrector_names: null
  ocean_heat_corrector: false
