# yaml-language-server: $schema=../schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 12
batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0006
scheduler:
  type: cosine
  target_epochs: 70
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
train_time:
  # Match the SamudraMulti fast proxy's approximately 512 timestamps.
  start: "2006-10-05"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times: []
data_stride: [1]
steps: [1]
step_transition: []
preemptible: false

backend: auto

experiment:
  name: samudra_om4_v2_1deg_mse_fast_proxy
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: default
data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_all
    boundary_vars_key: tau_hfds
  static_data_vars: []
  concurrent_compute: true
  loading:
    type: rust
    prefetch_batches: 2
    max_concurrent_reads: 4
    prefetch_to_device: true
  sources:
    - data_location: om4_onedeg_v3/OM4.zarr
      data_means_location: om4_onedeg_v3/OM4_means.zarr
      data_stds_location: om4_onedeg_v3/OM4_stds.zarr
model: !include model.yaml
