name: train
sub_name: cm4_samudra
rand_seed: 1
base_output_dir: train_3D
debug: false
gantry: false
cluster_data_dir: /mnt/home/sd5313/data/
backend: auto

wandb:
  mode: online
  project: 3D_ocean_emu_CM4
  entity: suryadheeshjith

training:
  distributed: true
  disk_mode: true
  num_workers: 4
  pin_mem: true
  save_freq: 5
  epochs: 120
  batch_size: 4
