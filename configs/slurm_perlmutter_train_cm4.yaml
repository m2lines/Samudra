debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 120
batch_size: 3
learning_rate: 0.0001
scheduler: true
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: [-1]
data_percent: 1.0
train:
  start_time: "0151-01-06"
  end_time: "0306-01-01"
val:
  start_time: "0306-01-01"
  end_time: "0311-01-01"
inference:
  - start_time: "0151-01-06"
    end_time: "0171-01-11"
  - start_time: "0171-01-06"
    end_time: "0191-01-11"
  - start_time: "0191-01-06"
    end_time: "0211-01-11"
  - start_time: "0211-01-06"
    end_time: "0231-01-11"
  - start_time: "0231-01-06"
    end_time: "0251-01-11"
  - start_time: "0251-01-06"
    end_time: "0271-01-11"
  - start_time: "0271-01-06"
    end_time: "0291-01-11"
  - start_time: "0291-01-06"
    end_time: "0311-01-11"
data_stride: [1]
steps: [4]
step_transition: []
backend: auto

experiment:
  base_name: train
  sub_name: cm4_samudra
  rand_seed: 5
  base_output_dir: train
  gantry: false
  cluster_data_dir: /pscratch/sd/s/suryad/data
  wandb:
    mode: online
    project: ocean-emulators
    entity: m2lines
    group: samudra-train-cm4-opt
  network: Samudra
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds

data:
  data_path: cm4_piControl_ocean_200yr_full_chunked.zarr
  data_means_path: 2024-11-12-cm4-piControl-ocean-200yr-dataset-stats/centering.nc
  data_stds_path: 2024-11-12-cm4-piControl-ocean-200yr-dataset-stats/scaling-full-field.nc
  scaling_residuals_file: null
  time_delta: 5
  num_workers: 4
  hist: 1
  loader_version: "om4-eager"
  use_dask: false


samudra:
  ch_width: [157, 200, 250, 300, 400]
  n_out: 77
  dilation: [1, 2, 4, 8]
  n_layers: [1, 1, 1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 4
    norm: "batch"

  corrector:
    non_negative_corrector_names:
      - "so"

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"