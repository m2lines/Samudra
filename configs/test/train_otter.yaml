# yaml-language-server: $schema=../schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: false
save_freq: 1
epochs: 1
batch_size: 1
preemptible: false
learning_rate: 0.0001
scheduler: null
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
train_time:
  start: "1975-08-15"
  end: "1975-10-25"
val_time:
  start: "1975-10-25"
  end: "1975-11-25"
inference_times: []
data_stride: [1]
steps: [1]
step_transition: []
backend: cpu

experiment:
  name: test_otter
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: ocean-emulators
  data_root: .data_cache/
data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_5
    boundary_vars_key: tau_hfds
  sources:
    - data_location: data.zarr
      data_means_location: means.nc
      data_stds_location: stds.nc
  loading:
    type: cpu
    num_workers: 0
  hist: 0

model:
  checkpointing: null
  pred_residuals: true
  last_kernel_size: 1
  pad: circular
  use_bfloat16: false
  backbone:
    token_dim: 16
    stage_depths: [1, 1]
    num_heads: 4
    window_size: 2
    patch_size: 2
    position_features: 16
    position_min_scale: 0.1
    position_max_scale: 720.0
    hidden_ratio: 2.0
    ffn_align_to: 8
    dropout_rate: 0.0
    drop_path_rate: 0.0
