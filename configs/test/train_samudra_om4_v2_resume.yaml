# yaml-language-server: $schema=../schemas/TrainConfig.json

# A small Samudra OM4 v2 config for checkpoint/resume parity tests.
debug: false
disk_mode: true
pin_mem: true
save_freq: 1
epochs: 2
batch_size: 1
preemptible: false
learning_rate: 0.0006
gradient_accumulation_steps: 1
# Keep the scheduler horizon fixed when the test simulates interruption by
# stopping the first run after one epoch.
scheduler: { type: cosine, target_epochs: 2 }
loss:
  type: dynamic
  metric: mse
  limit: 20
finetune: false
resume_ckpt_path: null
inference_epochs: []
train_time:
  start: "1975-08-15"
  end: "1975-10-25"
val_time:
  start: "1975-10-25"
  end: "1975-11-25"
inference_times: []
data_stride: [1]
steps: [1]
step_transition: []
backend: auto

experiment:
  name: test_samudra_om4_v2_resume
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: samudra-train-om4
  data_root: .data_cache/
data:
  dataset:
    type: om4
    prognostic_vars_key: thermo_dynamic_all
    boundary_vars_key: tau_hfds_hfds_anom
  sources:
    - data_location: data.zarr
      data_means_location: means.nc
      data_stds_location: stds.nc
  loading:
    type: cpu
    num_workers: 0
    persistent_workers: false
  hist: 1
  concurrent_compute: false

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  unet:
    ch_width: [8, 8, 8, 8]
    dilation: [1, 1, 1, 1]
    n_layers: [1, 1, 1, 1]

    core_block:
      block_type: "conv_next_block"
      kernel_size: 3
      activation: "capped_gelu"
      upscale_factor: 2
      norm: "batch"

    down_sampling_block: "avg_pool"
    up_sampling_block: "zonally_periodic_upsample"

  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false
