# yaml-language-server: $schema=schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 1
epochs: 1
batch_size:  1 #1 4
learning_rate: 0.0001
scheduler: null
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: [-1]
data_percent: 0.01 #1.0
train_time:
  start: "2011-09-13"
  end: "2011-10-13"
val_time:
  start: "2011-10-13"
  end: "2011-11-13"
inference_times:
  - start: "2011-11-13"
    end: "2011-12-13"
#  - start: "0153-01-06"
#    end: "0155-01-11"
#  - start: "0155-01-06"
#    end: "0157-01-11"
#  - start: "0157-01-06"
#    end: "0159-01-11"
#  - start: "0159-01-06"
#    end: "0161-01-11"
#  - start: "0161-01-06"
#    end: "0163-01-11"
#  - start: "0163-01-06"
#    end: "0165-01-11"
#  - start: "0309-01-06"
#    end: "0311-01-11"
data_stride: [1]
steps: [4]
step_transition: []
backend: auto

experiment:
  name: LLC_train_11-7
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: samudra-train-cm4
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds

data: !include data/LLC_data.yaml


model:
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  unet:
    ch_width: [200, 250, 300, 400]
    dilation: [1, 2, 4, 8]
    n_layers: [1, 1, 1, 1]

    core_block:
      block_type: "conv_next_block"
      kernel_size: 3
      activation: "capped_gelu"
      upscale_factor: 4
      norm: "batch"

    down_sampling_block: "avg_pool"
    up_sampling_block: "bilinear_upsample"

  corrector:
    non_negative_corrector_names:
      - "Salt"
    ocean_heat_corrector: False