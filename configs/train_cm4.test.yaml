# A config file to test training.
# Used in automated tests.
debug: true
disk_mode: true
pin_mem: false
save_freq: 5
epochs: 120
batch_size: 2 # 4
learning_rate: 0.0001
scheduler: false
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: [-1]
data_percent: 1.0
train:
  start_time: '1969-08-15'
  end_time: '1969-08-30'
val:
  start_time: '1969-09-01'
  end_time: '1969-09-05'
inference:
  - start_time: '1969-09-06'
    end_time: '1969-09-12'
data_stride: [1]
steps: [4]
step_transition: []

distributed:
  enabled: true
  dist_url: null
  world_size: null
  rank: null
  gpu: null
  dist_backend: null

experiment:
  name: train
  sub_name: test_cm4_samudra
  rand_seed: 15
  base_output_dir: .LOCAL
  gantry: false
  cluster_data_dir: will_be_replaced
  wandb:
    mode: disabled
    project: 3D_ocean_emu_CM4
    entity: testrobot
  network: convnextunet
  exp_num_in: '3D_5'
  exp_num_extra: '3D_5'
  exp_num_out: '3D_5'
data:
  data_path: fake/data/path/cm4_piControl_ocean_200yr_full.zarr
  data_means_path: fake/data/path/cm4-piControl-ocean-200yr-dataset-stats/centering.nc
  data_stds_path: fake/data/path/piControl-ocean-200yr-dataset-stats/scaling-full-field.nc
  scaling_residuals_file: null
  depth_mode: all
  time_delta: 5
  num_workers: 4
  hist: 0


unet:
  ch_width: [2, 3]
  n_out: 4
  dilation: [1, 2]
  n_layers: [1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "batch"

  corrector:
    non_negative_corrector_names:
      - "so"

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"
