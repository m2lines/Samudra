# A config file to test training.
# Used in automated tests.
debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 2
batch_size: 1
learning_rate: 0.0001
scheduler: false
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: [-1]
data_percent: 1.0
train:
  start_time: '1969-08-15'
  end_time: '1969-10-20'
val:
  start_time: '1969-10-20'
  end_time: '1969-11-20'
inference:
  - start_time: '1969-11-20'
    end_time: '1969-12-15'
data_stride: [1]
steps: [2]
step_transition: []
backend: auto

experiment:
  base_name: train
  sub_name: test
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: samudra-train-om4
  network: convnextunet
  exp_num_in: '3D_5'
  exp_num_extra: '3D_5'
  exp_num_out: '3D_5'
data:
  data_path: fake/path/to/data
  data_means_path: fake/path/to/means
  data_stds_path: fake/path/to/stds
  scaling_residuals_file: null
  depth_mode: all
  time_delta: 5
  num_workers: 4
  hist: 0


unet:
  ch_width: [2, 3]
  n_out: 4
  dilation: [1, 2]
  n_layers: [1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "batch"

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"
