# yaml-language-server: $schema=schemas/TrainConfig.json

# Minimal FOMO config for benchmark tests
# Designed to fit within g6.xlarge constraints (16GB RAM, 23GB GPU)
debug: false
disk_mode: true
pin_mem: false  # Don't pin memory to reduce overhead
save_freq: 5
epochs: 1  # Single epoch for benchmarks
batch_size: 1
preemptible: false
learning_rate: 0.0001
scheduler: null
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: [-1]
data_percent: 0.05  # Use only 5% of data to reduce memory footprint
train_time:
  start: '1975-08-15'
  end: '1975-08-20'  # Very short time window (5 days)
val_time:
  start: '1975-08-20'
  end: '1975-08-22'  # 2 days validation
inference_times:
  - start: '1975-08-22'
    end: '1975-08-24'  # 2 days inference
data_stride: [1]
steps: [1]
step_transition: []
backend: auto

experiment:
  name: test
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: samudra-train-om4
  prognostic_vars_key: thermo_dynamic_5
  boundary_vars_key: tau_hfds
  data_root: .data_cache/
data:
  data_location: data.zarr
  data_means_location: means.nc
  data_stds_location: stds.nc
  scaling_residuals_file: null
  num_workers: 1  # Minimal workers to reduce memory overhead
  hist: 0


model:
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  embedding_dim: 1  # Minimal embedding dimension

  encoder:
    perceiver_depth: 1  # Single Perceiver layer

  processor:
    ch_width: [1]  # Single level, minimal channels
    dilation: [1]
    n_layers: [1]

    core_block:
      block_type: "conv_next_block"
      kernel_size: 3
      activation: "capped_gelu"
      upscale_factor: 2
      norm: "batch"

    down_sampling_block: "avg_pool"
    up_sampling_block: "bilinear_upsample"