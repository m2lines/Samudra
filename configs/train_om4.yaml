# yaml-language-server: $schema=schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 4
learning_rate: 0.0002
scheduler: true
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: [-1]
data_percent: 1.0
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times:
  - start: "2014-10-10"
    end: "2015-10-10"
  - start: "2015-10-10"
    end: "2016-10-10"
  - start: "2016-10-10"
    end: "2017-10-10"
  - start: "2017-10-10"
    end: "2018-10-10"
  - start: "2018-10-10"
    end: "2019-10-10"
  - start: "2019-10-10"
    end: "2020-10-10"
  - start: "2020-10-10"
    end: "2021-10-10"
  - start: "2021-10-10"
    end: "2022-12-24"
data_stride: [1]
steps: [4]
step_transition: []

backend: auto

experiment:
  name: local_om4_samudra
  rand_seed: 15
  base_output_dir: .LOCAL
  gantry: false
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: samudra-train-om4
  network: Samudra
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds_hfds_anom
data:
  !include data/public.yaml


samudra:
  ch_width: [157, 200, 250, 300, 400]
  n_out: 77
  dilation: [1, 2, 4, 8]
  n_layers: [1, 1, 1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"
  checkpointing: "simple"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 4
    norm: "batch"

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"

  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false