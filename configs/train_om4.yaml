# yaml-language-server: $schema=schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 1
learning_rate: 0.0002
scheduler: true
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: [-1]
data_percent: 1.0
train_time:
  start: "1975-01-03"
  end: "1975-02-05"
val_time:
  start: "2013-10-05"
  end: "2013-11-05"
inference_times:
  - start: "1975-01-03"
    end: "1985-01-03" # "1985-01-03"
  - start: "1985-01-03"
    end: "1986-01-03" # "1995-01-03"
  - start: "1995-01-03"
    end: "1996-01-03" # "2005-01-03"
  - start: "2004-10-05"
    end: "2005-10-05" # "2014-10-05"
data_stride: [1]
steps: [1]
step_transition: []

backend: auto

experiment:
  base_name: train
  sub_name: local_om4_samudra
  rand_seed: 15
  base_output_dir: .LOCAL
  gantry: false
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: samudra-train-om4
  network: Samudra
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds_hfds_anom
data:
  !include data/public.yaml



samudra:
  ch_width: [2, 3]
  n_out: 4
  dilation: [1, 2]
  n_layers: [1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 2
    norm: "batch"

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"
