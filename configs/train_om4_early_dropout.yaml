# yaml-language-server: $schema=schemas/TrainConfig.json
# Early Dropout Experiment Configuration
# Based on "Early Dropout: Dropping layers to reduce underfitting"

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 4
learning_rate: 0.0002
scheduler: true
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times:
  - start: "1975-01-03"
    end: "1976-01-03"
  - start: "1985-01-03"
    end: "1986-01-03"
  - start: "1995-01-03"
    end: "1996-01-03"
  - start: "2004-10-05"
    end: "2005-10-05"
data_stride: [1]
steps: [4]
step_transition: []

backend: auto

experiment:
  name: om4_early_dropout_experiment
  rand_seed: 42
  base_output_dir: .LOCAL
  wandb:
    mode: disabled  # Change to "online" to enable wandb logging
    project: ocean-emulators-dropout
    entity: m2lines
    group: early-dropout-experiments
  network: Samudra
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds_hfds_anom

data: !include data/om4_ohc.yaml

samudra:
  ch_width: [157, 200, 250, 300, 400]
  n_out: 77
  dilation: [1, 2, 4, 8]
  n_layers: [1, 1, 1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 4
    norm: "batch"

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"

  # Early Dropout Configuration
  stochastic_depth:
    # Core early dropout settings
    drop_path_rate: 0.15          # 15% peak dropout rate (paper recommends 0.1-0.2)
    early_dropout_epochs: 30      # Apply dropout for first 30 epochs
    dropout_schedule: "early_only"  # Only apply during early training
    linear_decay_to_zero: true    # Linear decay from 0.15 to 0 over 30 epochs

    # Optional: Different rates per stage (encoder progression)
    per_stage_multipliers: [0.5, 0.8, 1.0, 1.2]  # Lighter at shallow, heavier at deep layers

  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: true