# yaml-language-server: $schema=schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 4
learning_rate: 0.0004
scheduler: { type: cosine }
loss: mse_dynamic_no_limit
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times:
  - start: "1975-01-03"
    end: "1976-01-03"
  - start: "1985-01-03"
    end: "1986-01-03"
  - start: "1995-01-03"
    end: "1996-01-03"
  - start: "2004-10-05"
    end: "2005-10-05"
data_stride: [1]
steps: [4]
step_transition: []

backend: auto

experiment:
  name: local_om4_hilt
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: hilt-train-om4
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds_hfds_anom
data: !include data/public.yaml

model:
  # HilT-specific configuration
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  # Transformer architecture
  embed_dim: 96
  depths: [2, 2, 6, 2]          # Encoder stage depths
  num_heads: [3, 6, 12, 24]     # Attention heads per stage
  kernel_sizes: [11, 11, 9, 7]  # NAT kernel sizes (decreasing with resolution)

  # Transformer hyperparameters
  mlp_ratio: 4.0
  qkv_bias: true
  drop_path_rate: 0.1

  # Stem and upsampling
  stem_downsample: 2            # 360×720 → 180×360
  upsample_type: "bilinear"     # Decoder upsampling method