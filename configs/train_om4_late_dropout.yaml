# yaml-language-server: $schema=schemas/TrainConfig.json
# Late Dropout Baseline Configuration
# Traditional dropout approach for comparison

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 4
learning_rate: 0.0002
scheduler: true
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times:
  - start: "1975-01-03"
    end: "1976-01-03"
  - start: "1985-01-03"
    end: "1986-01-03"
  - start: "1995-01-03"
    end: "1996-01-03"
  - start: "2004-10-05"
    end: "2005-10-05"
data_stride: [1]
steps: [4]
step_transition: []

backend: auto

experiment:
  name: om4_late_dropout_baseline
  rand_seed: 42
  base_output_dir: .LOCAL
  wandb:
    mode: disabled  # Change to "online" to enable wandb logging
    project: ocean-emulators-dropout
    entity: m2lines
    group: late-dropout-baseline
  network: Samudra
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds_hfds_anom

data: !include data/om4_ohc.yaml

samudra:
  ch_width: [157, 200, 250, 300, 400]
  n_out: 77
  dilation: [1, 2, 4, 8]
  n_layers: [1, 1, 1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 4
    norm: "batch"

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"

  # Late Dropout Configuration (Traditional approach)
  stochastic_depth:
    drop_path_rate: 0.1           # Standard 10% dropout rate
    early_dropout_epochs: 30      # Wait 30 epochs before starting dropout
    dropout_schedule: "late_only"  # Only apply after early period
    linear_decay_to_zero: false   # Constant rate after epoch 30

  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: true