debug: true
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 4
learning_rate: 0.0002
scheduler: true
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: [-1]
data_percent: 1.0
train:
  start_time: "1975-01-03"
  end_time: "1976-01-03" # "2013-10-05"
val:
  start_time: "2013-10-05"
  end_time: "2014-10-05"
inference:
  - start_time: "1975-01-03"
    end_time: "1976-01-03"
data_stride: [1]
steps: [4]
step_transition: []

distributed:
  enabled: true
  dist_url: null
  world_size: null
  rank: null
  gpu: null
  dist_backend: null

experiment:
  name: train
  sub_name: local_om4_samudra
  rand_seed: 15
  base_output_dir: .LOCAL
  gantry: false
  cluster_data_dir: null
  network: convnextunet
  exp_num_in: 3D_all
  exp_num_extra: 3D_all_hfds_anom
  exp_num_out: 3D_all
data:
  data_path: 3D_data_OM4_5daily_v0.2.1_with_hfds_anomalies
  data_means_path: 3D_data_OM4_5daily_v0.2.1_with_hfds_anomalies_means
  data_stds_path: 3D_data_OM4_5daily_v0.2.1_with_hfds_anomalies_stds
  scaling_residuals_file: null
  depth_mode: all
  time_delta: 5
  num_workers: 4
  hist: 1


unet:
  ch_width: [158, 200, 250, 300, 400] # This includes input channels
  n_out: 154
  dilation: [1, 2, 4, 8]
  n_layers: [1, 1, 1, 1]
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"

  core_block:
    block_type: "conv_next_block"
    kernel_size: 3
    activation: "capped_gelu"
    upscale_factor: 4
    norm: "batch"

  down_sampling_block: "avg_pool"
  up_sampling_block: "bilinear_upsample"
