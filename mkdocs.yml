site_name: Ocean Emulators
site_url: https://open-athena.github.io/Ocean_Emulator/api/
repo_url: https://github.com/Open-Athena/Ocean_Emulator
repo_name: Open-Athena/Ocean_Emulator
docs_dir: docs-src
site_dir: docs/api

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            members_order: source
            docstring_style: google

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - Concepts:
    - Architecture: concepts/architecture.md
  - API Reference:
    - Models:
      - Base Model: models/base.md
      - Samudra: models/samudra.md
      - FOMO: models/fomo.md
      - Modules: models/modules.md
    - Data:
      - Datasets: datasets.md
    - Training:
      - Stepper: stepper.md
      - Train: train.md
      - Eval: eval.md
    - Configuration: config.md
    - Utilities:
      - Data Utils: utils/data.md
      - Distributed: utils/distributed.md
      - Loss: utils/loss.md
      - EMA: utils/ema.md
      - Schedule: utils/schedule.md
      - Samplers: utils/samplers.md
      - Writer: utils/writer.md
    - Visualization: viz.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - def_list
  - attr_list
